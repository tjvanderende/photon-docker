name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
    - title: "Features"
      labels:
          - "feature"
          - "enhancement"
    - title: "Fixes"
      labels:
          - "fix"
          - "bugfix"
          - "bug"
    - title: "Photon Version Updates"
      labels:
          - "update"
          - "automated-pr"
    - title: "Maintenance"
      labels:
          - "chore"
          - "maintenance"
          - "dependencies"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
    major:
        labels:
            - "major"
            - "breaking-change"
    minor:
        labels:
            - "minor"
            - "feature"
            - "enhancement"
    patch:
        labels:
            - "patch"
            - "fix"
            - "bugfix"
            - "bug"
            - "update"
            - "automated-pr"
            - "maintenance"
            - "chore"
            - "dependencies"
    default: patch

template: |
    ## What's Changed

    $CHANGES

    **Full Changelog**: $PREVIOUS_TAG...v$RESOLVED_VERSION
